services:
  - type: web
    name: guild-api
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install -g pnpm@9.15.9 && NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @guild/shared-types build && pnpm --filter @guild/shared-utils build && pnpm --filter @guild/api prisma:generate && pnpm --filter @guild/api build
    startCommand: cd apps/api && pnpm run prisma:migrate && node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_DAYS
        value: "7"
      - key: JWT_REFRESH_DAYS_REMEMBER
        value: "90"
      - key: CORS_ORIGIN
        sync: false
      - key: GUILD_WAR_AUTO_SCHEDULE_ENABLED
        value: "true"
      - key: GUILD_WAR_AUTO_SCHEDULE_WEEKS_AHEAD
        value: "4"
